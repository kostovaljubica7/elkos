<!DOCTYPE html>
<html lang="mk" style="scroll-behavior: smooth;">
<head>
    <meta charset="utf-8">
    <title>ЕЛКОС | ABC алати — е-Продавница</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta name="description" content="ABC алати — клешти, секачи, кобра, клучеви и повеќе. Квалитетни германски алати достапни преку ЕЛКОС.">

    <link rel="icon" type="image/svg+xml" href="img/favicon.svg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #22c55e;
            --primary-dark: #16a34a;
            --bg-dark: #0f1419;
            --bg-card: #1a1f26;
            --bg-card-hover: #242b34;
            --text-white: #ffffff;
            --text-gray: #9ca3af;
            --text-muted: #6b7280;
            --border-color: #2d3748;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { -webkit-text-size-adjust: 100%; overflow-x: hidden; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Poppins', 'Inter', sans-serif;
            font-weight: 600;
        }

        a { text-decoration: none; color: inherit; transition: color 0.3s ease; }

        /* ─── Navbar ─── */
        .navbar-dark-custom {
            background-color: var(--bg-dark);
            padding: 15px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .navbar-brand-custom {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .navbar-brand-custom .logo-icon {
            width: 40px; height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            display: flex; align-items: center; justify-content: center;
        }

        .navbar-brand-custom .logo-icon i { color: white; font-size: 20px; }

        .navbar-brand-custom span {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-white);
        }

        .nav-link-custom {
            color: var(--text-gray) !important;
            font-weight: 500;
            transition: color 0.3s ease;
            font-size: 15px;
            padding: 6px 14px !important;
        }

        .nav-link-custom:hover, .nav-link-custom.active {
            color: var(--text-white) !important;
            font-weight: 700;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-gray);
            font-size: 14px;
            font-weight: 500;
            padding: 6px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .btn-back:hover { color: var(--text-white); border-color: var(--primary); }

        .navbar-toggler {
            border: 1px solid var(--border-color);
            padding: 6px 10px;
        }

        .navbar-toggler:focus { box-shadow: none; }

        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba(255, 255, 255, 0.8)' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
        }

        /* ─── Page Hero ─── */
        .shop-hero {
            background: linear-gradient(135deg, #0f1419 0%, #1a1f26 50%, #0f1419 100%);
            border-bottom: 1px solid var(--border-color);
            padding: 56px 0 40px;
            text-align: center;
        }

        .ABC-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 50px;
            padding: 6px 18px;
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .ABC-badge .dot {
            width: 8px; height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .shop-hero h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            color: var(--text-white);
            margin-bottom: 14px;
        }

        .shop-hero h1 span { color: var(--primary); }

        .shop-hero p {
            color: var(--text-gray);
            font-size: 16px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* ─── Search & Filter ─── */
        .filter-bar {
            background-color: var(--bg-dark);
            border-bottom: 1px solid var(--border-color);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .search-wrapper {
            position: relative;
            flex: 1;
            max-width: 480px;
        }

        .search-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 15px;
        }

        .search-input {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-white);
            padding: 10px 14px 10px 40px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .search-input::placeholder { color: var(--text-muted); }
        .search-input:focus { border-color: var(--primary); }

        .filter-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-gray);
            font-size: 13px;
            font-weight: 600;
            padding: 7px 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
        }

        .filter-btn:hover { color: var(--text-white); border-color: rgba(34,197,94,0.4); }

        .filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }

        /* ─── Product Grid ─── */
        .shop-section {
            padding: 40px 0 60px;
        }

        .results-info {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .results-info span { color: var(--primary); font-weight: 600; }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            transition: gap 0.2s ease;
        }

        .product-grid.cols-1 { grid-template-columns: 1fr; gap: 14px; }
        .product-grid.cols-2 { grid-template-columns: repeat(2, 1fr); gap: 18px; }
        .product-grid.cols-5 { grid-template-columns: repeat(5, 1fr); gap: 14px; }

        @media (max-width: 1200px) { .product-grid:not(.cols-1):not(.cols-2) { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px)  { .product-grid:not(.cols-1) { grid-template-columns: repeat(2, 1fr); gap: 14px; } }
        @media (max-width: 480px)  { .product-grid { grid-template-columns: 1fr !important; } }

        /* ─── Grid switcher ─── */
        .grid-switcher {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: auto;
        }

        .grid-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 7px;
            color: var(--text-muted);
            width: 34px; height: 34px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.15s ease;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
        }

        .grid-btn:hover { color: var(--text-white); border-color: rgba(34,197,94,0.4); }
        .grid-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }

        /* ─── Product Card ─── */
        .product-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            overflow: hidden;
            transition: all 0.25s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            background: var(--bg-card-hover);
            border-color: rgba(34, 197, 94, 0.35);
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }

        .product-image {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .product-image .tool-icon {
            font-size: 52px;
            opacity: 0.9;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
            transition: transform 0.3s ease;
        }

        .product-card:hover .tool-icon { transform: scale(1.08) rotate(-4deg); }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .product-card:hover .product-image img { transform: scale(1.04); }

        /* category color backgrounds */
        .bg-kleshti  { background: linear-gradient(135deg, #1e2a3a 0%, #162032 100%); }
        .bg-sekachi  { background: linear-gradient(135deg, #2a1e1e 0%, #321616 100%); }
        .bg-kobra    { background: linear-gradient(135deg, #1e2a1e 0%, #162416 100%); }
        .bg-klucev   { background: linear-gradient(135deg, #2a271e 0%, #322416 100%); }
        .bg-lenti    { background: linear-gradient(135deg, #1e2028 0%, #161828 100%); }
        .bg-specijal { background: linear-gradient(135deg, #27201e 0%, #241618 100%); }

        .cat-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.6px;
            padding: 4px 10px;
            border-radius: 6px;
            text-transform: uppercase;
        }

        .cat-kleshti  { background: rgba(59,130,246,0.85);  color: #fff; }
        .cat-sekachi  { background: rgba(239,68,68,0.85);   color: #fff; }
        .cat-kobra    { background: rgba(34,197,94,0.85);   color: #fff; }
        .cat-klucev   { background: rgba(234,179,8,0.85);   color: #000; }
        .cat-lenti    { background: rgba(139,92,246,0.85);  color: #fff; }
        .cat-specijal { background: rgba(249,115,22,0.85);  color: #fff; }

        .product-body {
            padding: 16px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .product-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-white);
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .product-desc {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.5;
            flex: 1;
            margin-bottom: 14px;
        }

        .product-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .product-price {
            font-size: 17px;
            font-weight: 800;
            color: var(--primary);
        }

        .btn-details {
            background: rgba(34,197,94,0.12);
            border: 1px solid rgba(34,197,94,0.3);
            border-radius: 8px;
            color: var(--primary);
            font-size: 12px;
            font-weight: 600;
            padding: 6px 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
        }

        .btn-details:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }

        /* ─── No results ─── */
        .no-results {
            display: none;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .no-results i { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
        .no-results p { font-size: 16px; }

        /* ─── Modal ─── */
        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            color: var(--text-white);
        }

        .modal-header {
            border-bottom: 1px solid var(--border-color);
            padding: 20px 24px;
        }

        .modal-title { font-weight: 700; font-size: 18px; }

        .btn-close { filter: invert(1) grayscale(1) brightness(2); }

        .modal-body { padding: 24px; }

        .modal-icon {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 72px;
        }

        .modal-price {
            font-size: 26px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 14px;
        }

        .modal-desc {
            color: var(--text-gray);
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .modal-specs {
            background: #0f1419;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .modal-specs h6 {
            color: var(--text-gray);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .spec-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
        }

        .spec-row:last-child { border-bottom: none; }
        .spec-label { color: var(--text-muted); }
        .spec-value { color: var(--text-white); font-weight: 600; }

        .btn-contact-modal {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background: var(--primary);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            padding: 13px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: background 0.2s ease;
            text-decoration: none;
        }

        .btn-contact-modal:hover { background: var(--primary-dark); color: #fff; }

        /* ─── Footer note ─── */
        .shop-footer {
            border-top: 1px solid var(--border-color);
            padding: 24px 0;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
        }

        .shop-footer a { color: var(--primary); }

        @media (max-width: 768px) {
            .filter-bar .d-flex { flex-direction: column; gap: 12px; }
            .search-wrapper { max-width: 100%; }
        }

        /* ─── Cart Button on Card ─── */
        .btn-add-cart {
            background: rgba(34,197,94,0.12);
            border: 1px solid rgba(34,197,94,0.3);
            border-radius: 8px;
            color: var(--primary);
            font-size: 14px;
            padding: 6px 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-add-cart:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }

        .btn-add-cart.added {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
            animation: pop 0.25s ease;
        }

        @keyframes pop {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.25); }
            100% { transform: scale(1); }
        }

        /* ─── Navbar Cart Icon ─── */
        .cart-nav-btn {
            position: relative;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-gray);
            font-size: 18px;
            width: 42px; height: 42px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .cart-nav-btn:hover { color: var(--primary); border-color: var(--primary); }

        .cart-badge {
            position: absolute;
            top: -6px; right: -6px;
            background: var(--primary);
            color: #fff;
            font-size: 10px;
            font-weight: 800;
            min-width: 18px; height: 18px;
            border-radius: 9px;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            font-family: 'Inter', sans-serif;
        }

        .cart-badge.visible { display: flex; }

        /* ─── Cart Drawer ─── */
        .cart-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1050;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .cart-overlay.open { opacity: 1; pointer-events: all; }

        .cart-drawer {
            position: fixed;
            top: 0; right: 0; bottom: 0;
            width: 400px;
            max-width: 100vw;
            background: var(--bg-card);
            border-left: 1px solid var(--border-color);
            z-index: 1051;
            transform: translateX(100%);
            transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
            display: flex;
            flex-direction: column;
        }

        .cart-drawer.open { transform: translateX(0); }

        .cart-drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .cart-drawer-header h5 {
            font-size: 17px;
            font-weight: 700;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cart-drawer-header h5 i { color: var(--primary); }

        .btn-close-cart {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
            line-height: 1;
            transition: color 0.2s;
        }

        .btn-close-cart:hover { color: var(--text-white); }

        .cart-items-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px 24px;
        }

        .cart-items-list::-webkit-scrollbar { width: 4px; }
        .cart-items-list::-webkit-scrollbar-track { background: transparent; }
        .cart-items-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        .cart-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            gap: 12px;
        }

        .cart-empty i { font-size: 48px; opacity: 0.3; }
        .cart-empty p { font-size: 15px; }

        .cart-item {
            display: flex;
            gap: 14px;
            padding: 14px 0;
            border-bottom: 1px solid var(--border-color);
            align-items: flex-start;
        }

        .cart-item:last-child { border-bottom: none; }

        .cart-item-icon {
            width: 52px; height: 52px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .cart-item-info { flex: 1; min-width: 0; }

        .cart-item-name {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-white);
            line-height: 1.3;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cart-item-price {
            font-size: 13px;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .qty-btn {
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-white);
            width: 26px; height: 26px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.15s ease;
            line-height: 1;
        }

        .qty-btn:hover { border-color: var(--primary); color: var(--primary); }

        .qty-value {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-white);
            min-width: 20px;
            text-align: center;
        }

        .cart-item-remove {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 14px;
            cursor: pointer;
            padding: 4px;
            transition: color 0.2s;
            flex-shrink: 0;
        }

        .cart-item-remove:hover { color: #ef4444; }

        /* ─── Cart Footer ─── */
        .cart-drawer-footer {
            padding: 20px 24px;
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .cart-total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .cart-total-label {
            font-size: 14px;
            color: var(--text-gray);
            font-weight: 600;
        }

        .cart-total-value {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
        }

        .btn-order {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background: var(--primary);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            padding: 13px;

            desc: "За стиснување на изолирани и неизолирани ракви 0.5–6мм².",
            price: "2.190 МКД",
            icon: "🔩",
            bgClass: "bg-specijal", badgeClass: "cat-specijal", badgeText: "Специјални",
            specs: [
                ["Жица", "0.5 – 6 мм²"], ["Тип", "Рачен криминг"], ["Должина", "200 мм"],
                ["Позиции", "4 × 2"], ["Шифра", "97 71 180"]
            ]
        },
        {
            id: 19, cat: "specijal",
            name: "Клешти за Seeger-прстени надворешни",
            desc: "За монтажа/демонтажа на надворешни Seeger осигурувачи. Прав нос.",
            price: "1.690 МКД",
            icon: "🔧",
            bgClass: "bg-specijal", badgeClass: "cat-specijal", badgeText: "Специјални",
            specs: [
                ["Тип", "Надворешен Seeger"], ["Нос", "Прав"], ["Опсег", "Ø 19 – 60 мм"],
                ["Должина", "180 мм"], ["Шифра", "44 10 J1"]
            ]
        },
        {
            id: 20, cat: "specijal",
            name: "Клешти за Seeger-прстени внатрешни",
            desc: "За монтажа/демонтажа на внатрешни Seeger осигурувачи. Аголен нос.",
            price: "1.790 МКД",
            icon: "🔧",
            bgClass: "bg-specijal", badgeClass: "cat-specijal", badgeText: "Специјални",
            specs: [
                ["Тип", "Внатрешен Seeger"], ["Нос", "Аголен 90°"], ["Опсег", "Ø 19 – 60 мм"],
                ["Должина", "180 мм"], ["Шифра", "44 20 J2"]
            ]
        }
    ];

    function buildCard(p) {
        return `
        <div class="product-card" data-cat="${p.cat}" data-name="${p.name.toLowerCase()}" data-id="${p.id}">
            <div class="product-image ${p.bgClass}">
                <span class="cat-badge ${p.badgeClass}">${p.badgeText}</span>
                <span class="tool-icon">${p.icon}</span>
            </div>
            <div class="product-body">
                <div class="product-name">${p.name}</div>
                <div class="product-desc">${p.desc}</div>
                <div class="product-footer">
                    <div class="product-price">${p.price}</div>
                    <div style="display:flex;gap:6px;">
                        <button class="btn-details" onclick="openModal(${p.id})">Детали</button>
                        <button class="btn-add-cart" id="card-cart-${p.id}" onclick="addToCart(${p.id}, event)" title="Додај во кошничка">
                            <i class="fas fa-cart-plus"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>`;
    }

    const grid = document.getElementById('productGrid');
    grid.innerHTML = products.map(buildCard).join('');
    updateBadge();
    renderCartItems();

    // ─── Filter & Search ───
    let activeCat = 'all';
    let searchTerm = '';

    function applyFilters() {
        const cards = document.querySelectorAll('.product-card');
        let visible = 0;
        cards.forEach(card => {
            const catOk = activeCat === 'all' || card.dataset.cat === activeCat;
            const nameOk = card.dataset.name.includes(searchTerm);
            const show = catOk && nameOk;
            card.style.display = show ? '' : 'none';
            if (show) visible++;
        });
        document.getElementById('countDisplay').textContent = visible;
        document.getElementById('noResults').style.display = visible === 0 ? 'block' : 'none';
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeCat = btn.dataset.cat;
            applyFilters();
        });
    });

    document.getElementById('searchInput').addEventListener('input', e => {
        searchTerm = e.target.value.toLowerCase();
        applyFilters();
    });

    // ─── Modal ───
    let currentModalId = null;

    function openModal(id) {
        const p = products.find(x => x.id === id);
        if (!p) return;
        currentModalId = id;
        document.getElementById('modalTitle').textContent = p.name;
        document.getElementById('modalPrice').textContent = p.price;
        document.getElementById('modalDesc').textContent = p.desc;
        document.getElementById('modalIcon').className = `modal-icon ${p.bgClass}`;
        document.getElementById('modalIcon').innerHTML = `<span style="font-size:72px">${p.icon}</span>`;
        document.getElementById('modalSpecs').innerHTML = `
            <h6>Технички спецификации</h6>
            ${p.specs.map(([l,v]) => `<div class="spec-row"><span class="spec-label">${l}</span><span class="spec-value">${v}</span></div>`).join('')}
        `;
        document.getElementById('modalCartBtn').innerHTML = '<i class="fas fa-cart-plus"></i> Додај во кошничка';
        document.getElementById('modalCartBtn').disabled = false;
        new bootstrap.Modal(document.getElementById('productModal')).show();
    }

    function addToCartFromModal() {
        if (currentModalId) {
            addToCart(currentModalId);
            const btn = document.getElementById('modalCartBtn');
            btn.innerHTML = '<i class="fas fa-check"></i> Додадено!';
            setTimeout(() => {
                btn.innerHTML = '<i class="fas fa-cart-plus"></i> Додај во кошничка';
            }, 1500);
        }
    }


    function priceNum(p) {
        return parseInt(p.price.replace(/\./g, '').replace(' МКД', ''));
    }

    function addToCart(id, event) {
        if (event) event.stopPropagation();
        const p = products.find(x => x.id === id);
        if (!p) return;
        const existing = cart.find(x => x.id === id);
        if (existing) {
            existing.qty++;
        } else {
            cart.push({ id: p.id, name: p.name, price: p.price, priceNum: priceNum(p), icon: p.icon, bgClass: p.bgClass, qty: 1 });
        }
        saveCart();
        updateBadge();
        renderCartItems();
        // Flash the card button
        const btn = document.getElementById(`card-cart-${id}`);
        if (btn) {
            btn.classList.add('added');
            setTimeout(() => btn.classList.remove('added'), 400);
        }
    }

    function updateBadge() {
        const total = cart.reduce((s, x) => s + x.qty, 0);
        const badge = document.getElementById('cartBadge');
        badge.textContent = total;
        badge.classList.toggle('visible', total > 0);
    }

    function renderCartItems() {
        const list = document.getElementById('cartItemsList');
        const footer = document.getElementById('cartFooter');
        if (cart.length === 0) {
            list.innerHTML = `<div class="cart-empty"><i class="fas fa-cart-shopping"></i><p>Кошничката е празна</p></div>`;
            footer.style.display = 'none';
            return;
        }
        footer.style.display = '';
        list.innerHTML = cart.map(item => `
            <div class="cart-item">
                <div class="cart-item-icon ${item.bgClass}">
                    <span>${item.icon}</span>
                </div>
                <div class="cart-item-info">
                    <div class="cart-item-name">${item.name}</div>
                    <div class="cart-item-price">${item.price}</div>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
                        <span class="qty-value">${item.qty}</span>
                        <button class="qty-btn" onclick="changeQty(${item.id}, +1)">+</button>
                    </div>
                </div>
                <button class="cart-item-remove" onclick="removeFromCart(${item.id})" title="Отстрани">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
        `).join('');
        const total = cart.reduce((s, x) => s + x.priceNum * x.qty, 0);
        document.getElementById('cartTotal').textContent = total.toLocaleString('mk-MK') + ' МКД';
    }

    function changeQty(id, delta) {
        const item = cart.find(x => x.id === id);
        if (!item) return;
        item.qty += delta;
        if (item.qty <= 0) cart = cart.filter(x => x.id !== id);
        saveCart();
        updateBadge();
        renderCartItems();
    }

    function removeFromCart(id) {
        cart = cart.filter(x => x.id !== id);
        saveCart();
        updateBadge();
        renderCartItems();
    }

    function clearCart() {
        cart = [];
        saveCart();
        updateBadge();
        renderCartItems();
    }

    function openCart() {
        document.getElementById('cartDrawer').classList.add('open');
        document.getElementById('cartOverlay').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeCart() {
        document.getElementById('cartDrawer').classList.remove('open');
        document.getElementById('cartOverlay').classList.remove('open');
        document.body.style.overflow = '';
    }

    // ─── Grid switcher ───
    document.querySelectorAll('.grid-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.grid-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const cols = btn.dataset.cols;
            const grid = document.getElementById('productGrid');
            grid.classList.remove('cols-1', 'cols-2', 'cols-5');
            if (cols !== '4') grid.classList.add('cols-' + cols);
        });
    });

    // ─── Checkout redirect ───
    function goToCheckout() {
        if (cart.length === 0) return;
        localStorage.setItem('elkos_cart', JSON.stringify(cart));
        window.location.href = 'checkout.html';
    }
    </script>
</body>
</html>
